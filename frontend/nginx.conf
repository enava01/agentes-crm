server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend container
    location /search {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /nearby-commercial {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
